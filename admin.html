<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Motorkompaniet Bokningar</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#0A0A0A;--dark:#1A1A1A;--card:#222;--red:#D94F2B;--white:#F0EDE8;--silver:#C8C8C8;--gray:#888;--border:#2E2E2E;--green:#2ECC71;--orange:#F39C12;--blue:#3498DB}
    body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white);min-height:100vh}

    /* LOGIN */
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:48px;width:100%;max-width:400px;text-align:center}
    .login-box h1{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
    .login-box p{color:var(--silver);font-size:14px;margin-bottom:32px}
    .login-box input{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:3px;color:var(--white);font-size:16px;padding:14px 18px;margin-bottom:16px}
    .login-box input:focus{outline:none;border-color:var(--red)}
    .login-box button{width:100%;background:var(--red);color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:3px;padding:14px;cursor:pointer}
    .login-box button:hover{background:#BF3E1F}
    .login-error{color:#e74c3c;font-size:13px;margin-top:12px;display:none}

    /* ADMIN LAYOUT */
    .admin-wrap{display:none}
    header{background:var(--dark);border-bottom:3px solid var(--red);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
    .header-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px}
    .header-logo span{color:var(--red)}
    .header-actions{display:flex;align-items:center;gap:16px}
    .btn-logout{background:none;border:1px solid var(--border);color:var(--silver);font-size:13px;padding:8px 16px;border-radius:3px;cursor:pointer}
    .btn-logout:hover{border-color:var(--silver)}

    /* STATS */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
    .stat{background:var(--dark);padding:20px 28px}
    .stat-num{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700}
    .stat-label{font-size:12px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
    .stat.pending .stat-num{color:var(--orange)}
    .stat.confirmed .stat-num{color:var(--blue)}
    .stat.completed .stat-num{color:var(--green)}

    /* TOOLBAR */
    .toolbar{display:flex;align-items:center;gap:12px;padding:20px 32px;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .filter-btn{background:var(--dark);border:1px solid var(--border);color:var(--silver);font-size:13px;font-weight:500;padding:8px 18px;border-radius:3px;cursor:pointer;transition:all 0.15s}
    .filter-btn:hover,.filter-btn.active{background:var(--red);border-color:var(--red);color:var(--white)}
    .toolbar-spacer{flex:1}
    .search-input{background:var(--dark);border:1px solid var(--border);color:var(--white);font-size:14px;padding:8px 16px;border-radius:3px;width:220px}
    .search-input:focus{outline:none;border-color:var(--red)}

    /* TABLE */
    .table-wrap{overflow-x:auto;padding:24px 32px}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th{background:var(--dark);color:var(--silver);font-size:11px;letter-spacing:2px;text-transform:uppercase;text-align:left;padding:10px 16px;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:hover td{background:rgba(255,255,255,0.02)}

    .reg{font-family:monospace;font-size:15px;font-weight:600;letter-spacing:2px;color:var(--white)}
    .customer-name{font-weight:500;color:var(--white)}
    .customer-contact{font-size:12px;color:var(--gray);margin-top:2px}
    .car-info{color:var(--silver)}
    .service-tag{display:inline-block;padding:4px 10px;border-radius:3px;font-size:12px;font-weight:600;background:rgba(217,79,43,0.15);color:var(--red);white-space:nowrap}
    .date-cell{white-space:nowrap;color:var(--silver)}
    .time-cell{font-family:monospace;font-size:14px;color:var(--white)}

    /* STATUS BADGE */
    .status{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
    .status::before{content:'';width:6px;height:6px;border-radius:50%}
    .status.pending{background:rgba(243,156,18,0.15);color:var(--orange)}
    .status.pending::before{background:var(--orange)}
    .status.confirmed{background:rgba(52,152,219,0.15);color:var(--blue)}
    .status.confirmed::before{background:var(--blue)}
    .status.completed{background:rgba(46,204,113,0.15);color:var(--green)}
    .status.completed::before{background:var(--green)}
    .status.cancelled{background:rgba(231,76,60,0.15);color:#e74c3c}
    .status.cancelled::before{background:#e74c3c}

    /* ACTIONS */
    .actions{display:flex;gap:8px}
    .action-btn{background:var(--dark);border:1px solid var(--border);color:var(--silver);font-size:12px;padding:5px 12px;border-radius:3px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
    .action-btn:hover{border-color:var(--silver);color:var(--white)}
    .action-btn.confirm{border-color:var(--blue);color:var(--blue)}
    .action-btn.confirm:hover{background:var(--blue);color:var(--white)}
    .action-btn.complete{border-color:var(--green);color:var(--green)}
    .action-btn.complete:hover{background:var(--green);color:var(--white)}
    .action-btn.cancel{border-color:#e74c3c;color:#e74c3c}
    .action-btn.cancel:hover{background:#e74c3c;color:var(--white)}

    /* NOTES */
    .notes-row td{background:rgba(255,255,255,0.01);border-bottom:2px solid var(--border);padding:8px 16px}
    .notes-input{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--silver);font-size:13px;padding:8px 12px;border-radius:3px;font-family:'DM Sans',sans-serif}
    .notes-input:focus{outline:none;border-color:var(--red)}

    .empty-state{text-align:center;padding:80px 32px;color:var(--gray)}
    .empty-state .icon{font-size:48px;margin-bottom:16px}

    .loading{text-align:center;padding:48px;color:var(--gray)}

    @media(max-width:768px){
      .stats-bar{grid-template-columns:repeat(2,1fr)}
      th:nth-child(4),td:nth-child(4),
      th:nth-child(7),td:nth-child(7){display:none}
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>Admin</h1>
    <p>Motorkompaniet Bokningssystem</p>
    <input type="password" id="tokenInput" placeholder="Lösenord" onkeydown="if(event.key==='Enter')login()" />
    <button onclick="login()">LOGGA IN</button>
    <p class="login-error" id="loginError">Fel lösenord. Försök igen.</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="adminWrap">
  <header>
    <div class="header-logo">MOTOR<span>KOMPANIET</span> <span style="color:var(--silver);font-size:14px;font-weight:400;margin-left:12px;">Bokningar</span></div>
    <div class="header-actions">
      <span id="lastRefresh" style="color:var(--gray);font-size:13px;"></span>
      <button class="btn-logout" onclick="logout()">Logga ut</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat pending">
      <div class="stat-num" id="stat-pending">–</div>
      <div class="stat-label">Väntar</div>
    </div>
    <div class="stat confirmed">
      <div class="stat-num" id="stat-confirmed">–</div>
      <div class="stat-label">Bekräftade</div>
    </div>
    <div class="stat completed">
      <div class="stat-num" id="stat-completed">–</div>
      <div class="stat-label">Klara</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-total">–</div>
      <div class="stat-label">Totalt</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="filter-btn active" onclick="setFilter('all',this)">Alla</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Väntar</button>
    <button class="filter-btn" onclick="setFilter('confirmed',this)">Bekräftade</button>
    <button class="filter-btn" onclick="setFilter('completed',this)">Klara</button>
    <button class="filter-btn" onclick="setFilter('cancelled',this)">Avbokade</button>
    <div class="toolbar-spacer"></div>
    <input class="search-input" type="text" placeholder="Sök namn, reg, tjänst..." id="searchInput" oninput="renderTable()" />
    <button class="filter-btn" onclick="loadBookings()" style="margin-left:4px;">↻ Uppdatera</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="loading" id="loadingState">Laddar bokningar...</div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">📅</div>
      <p>Inga bokningar hittades</p>
    </div>
    <table id="bookingsTable" style="display:none">
      <thead>
        <tr>
          <th>Reg.nr</th>
          <th>Kund</th>
          <th>Fordon</th>
          <th>Tjänst</th>
          <th>Datum</th>
          <th>Tid</th>
          <th>Status</th>
          <th>Åtgärder</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  let token = '';
  let allBookings = [];
  let currentFilter = 'all';

  const STATUS_LABELS = {
    pending: 'Väntar', confirmed: 'Bekräftad',
    completed: 'Klar', cancelled: 'Avbokad'
  };

  function login() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) return;
    token = t;
    document.getElementById('loginError').style.display = 'none';
    loadBookings();
  }

  function logout() {
    token = '';
    allBookings = [];
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('adminWrap').style.display = 'none';
    document.getElementById('tokenInput').value = '';
  }

  async function loadBookings() {
    try {
      const res = await fetch(`/api/bookings?token=${encodeURIComponent(token)}`);
      if (res.status === 401) {
        document.getElementById('loginError').style.display = 'block';
        return;
      }
      const data = await res.json();
      allBookings = data.bookings || [];

      // Show admin
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'block';

      updateStats();
      renderTable();

      const now = new Date().toLocaleTimeString('sv-SE', {hour:'2-digit',minute:'2-digit'});
      document.getElementById('lastRefresh').textContent = `Uppdaterad ${now}`;

    } catch (err) {
      alert('Kunde inte ladda bokningar. Kontrollera anslutningen.');
    }
  }

  function updateStats() {
    const counts = { pending: 0, confirmed: 0, completed: 0, cancelled: 0 };
    allBookings.forEach(b => { if (counts[b.status] !== undefined) counts[b.status]++; });
    document.getElementById('stat-pending').textContent   = counts.pending;
    document.getElementById('stat-confirmed').textContent = counts.confirmed;
    document.getElementById('stat-completed').textContent = counts.completed;
    document.getElementById('stat-total').textContent     = allBookings.length;
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allBookings.filter(b => {
      if (currentFilter !== 'all' && b.status !== currentFilter) return false;
      if (search) {
        const haystack = `${b.name} ${b.reg_number} ${b.service_type} ${b.email} ${b.phone}`.toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    const tbody = document.getElementById('tableBody');
    const table = document.getElementById('bookingsTable');
    const empty = document.getElementById('emptyState');
    const loading = document.getElementById('loadingState');

    loading.style.display = 'none';

    if (filtered.length === 0) {
      table.style.display = 'none';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    table.style.display = 'table';

    tbody.innerHTML = filtered.map(b => {
      const dateStr = b.preferred_date
        ? new Date(b.preferred_date + 'T12:00:00').toLocaleDateString('sv-SE', { weekday:'short', month:'short', day:'numeric' })
        : '–';

      const actions = [];
      if (b.status === 'pending') {
        actions.push(`<button class="action-btn confirm" onclick="updateStatus('${b.id}','confirmed')">Bekräfta</button>`);
        actions.push(`<button class="action-btn cancel" onclick="updateStatus('${b.id}','cancelled')">Avboka</button>`);
      } else if (b.status === 'confirmed') {
        actions.push(`<button class="action-btn complete" onclick="updateStatus('${b.id}','completed')">Markera klar</button>`);
        actions.push(`<button class="action-btn cancel" onclick="updateStatus('${b.id}','cancelled')">Avboka</button>`);
      } else if (b.status === 'cancelled' || b.status === 'completed') {
        actions.push(`<button class="action-btn" onclick="updateStatus('${b.id}','pending')">Återöppna</button>`);
      }

      return `
        <tr id="row-${b.id}">
          <td><span class="reg">${b.reg_number}</span></td>
          <td>
            <div class="customer-name">${b.name}</div>
            <div class="customer-contact">
              <a href="tel:${b.phone}" style="color:var(--gray);text-decoration:none;">${b.phone}</a>
            </div>
          </td>
          <td class="car-info">${b.car_make} ${b.car_model} ${b.car_year || ''}</td>
          <td><span class="service-tag">${b.service_type}</span></td>
          <td class="date-cell">${dateStr}</td>
          <td class="time-cell">${b.preferred_time}</td>
          <td><span class="status ${b.status}">${STATUS_LABELS[b.status] || b.status}</span></td>
          <td><div class="actions">${actions.join('')}</div></td>
        </tr>
        ${b.message ? `<tr class="notes-row"><td colspan="8"><span style="color:var(--gray);font-size:12px;">Kundens meddelande: </span>${b.message}</td></tr>` : ''}
      `;
    }).join('');
  }

  async function updateStatus(id, status) {
    try {
      const res = await fetch('/api/bookings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
        body: JSON.stringify({ id, status })
      });
      const data = await res.json();
      if (data.success) {
        const idx = allBookings.findIndex(b => b.id === id);
        if (idx !== -1) allBookings[idx].status = status;
        updateStats();
        renderTable();
      }
    } catch (err) {
      alert('Kunde inte uppdatera bokning.');
    }
  }
</script>
</body>
</html>
